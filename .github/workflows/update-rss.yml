name: Update RSS News

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  update-rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install certifi feedparser python-dateutil

      - name: Fetch RSS feeds
        run: python scripts/fetch_rss.py

      - name: Commit updated JSON if needed
        run: |
          if git diff --quiet --exit-code data/news.json; then
            echo "No changes detected in data/news.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git commit -m "chore: update RSS news data"
          git push
