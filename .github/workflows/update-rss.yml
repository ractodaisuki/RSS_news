name: Update RSS News

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: rss-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-rss:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ACTIONS_URL: ${{ github.server_url }}/${{ github.repository }}/actions
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare run metadata
        id: meta
        run: |
          echo "now_utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Set status to running
        env:
          NOW_UTC: ${{ steps.meta.outputs.now_utc }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("data/status.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          try:
              payload = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {}
          except Exception:
              payload = {}

          now = os.environ["NOW_UTC"]
          payload.update({
              "state": "running",
              "message": "RSS取得とWeb監視を実行中",
              "last_started_at": now,
              "last_completed_at": payload.get("last_completed_at", ""),
              "last_success_at": payload.get("last_success_at", ""),
              "last_failure_at": payload.get("last_failure_at", ""),
              "run_url": os.environ.get("RUN_URL") or os.environ.get("ACTIONS_URL", ""),
              "updated_at": now,
          })

          path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit running status
        run: |
          git add data/status.json
          if git diff --cached --quiet; then
            echo "No running-status changes to commit"
            exit 0
          fi
          git commit -m "chore: mark RSS update as running"
          git push

      - name: Fetch RSS feeds
        id: fetch
        run: |
          set +e
          python scripts/fetch_rss.py | tee fetch.log
          exit_code=${PIPESTATUS[0]}
          failed_feeds=$(awk -F': ' '/^Failed feeds:/ {print $2}' fetch.log | tail -1)
          successful_feeds=$(awk -F': ' '/^Successful feeds:/ {print $2}' fetch.log | tail -1)
          fetched_feeds=$(awk -F': ' '/^Fetched feeds:/ {print $2}' fetch.log | tail -1)
          articles_collected=$(awk -F': ' '/^Articles collected:/ {print $2}' fetch.log | tail -1)

          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          echo "failed_feeds=${failed_feeds:-0}" >> "$GITHUB_OUTPUT"
          echo "successful_feeds=${successful_feeds:-0}" >> "$GITHUB_OUTPUT"
          echo "fetched_feeds=${fetched_feeds:-0}" >> "$GITHUB_OUTPUT"
          echo "articles_collected=${articles_collected:-0}" >> "$GITHUB_OUTPUT"

          echo "Fetched feeds: ${fetched_feeds:-0}"
          echo "Successful feeds: ${successful_feeds:-0}"
          echo "Failed feeds: ${failed_feeds:-0}"
          echo "Articles collected: ${articles_collected:-0}"
          exit 0

      - name: Check websites
        id: watch
        run: |
          set +e
          python scripts/check_websites.py | tee watch.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Finalize status
        if: always()
        env:
          FETCH_EXIT_CODE: ${{ steps.fetch.outputs.exit_code }}
          WATCH_EXIT_CODE: ${{ steps.watch.outputs.exit_code }}
          FAILED_FEEDS: ${{ steps.fetch.outputs.failed_feeds }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          path = Path("data/status.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          try:
              payload = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {}
          except Exception:
              payload = {}

          now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          exit_code = int(os.environ.get("FETCH_EXIT_CODE") or "1")
          watch_exit_code = int(os.environ.get("WATCH_EXIT_CODE") or "1")
          failed_feeds = int(os.environ.get("FAILED_FEEDS") or "0")

          if exit_code != 0 or watch_exit_code != 0:
              payload["state"] = "error"
              payload["message"] = "更新失敗"
              payload["last_failure_at"] = now
          elif failed_feeds > 0:
              payload["state"] = "success"
              payload["message"] = "更新成功（一部フィード取得失敗あり）"
              payload["last_success_at"] = now
          else:
              payload["state"] = "success"
              payload["message"] = "更新成功"
              payload["last_success_at"] = now

          payload["last_started_at"] = payload.get("last_started_at", "") or now
          payload["last_completed_at"] = now
          payload["last_failure_at"] = payload.get("last_failure_at", "")
          payload["last_success_at"] = payload.get("last_success_at", "")
          payload["run_url"] = os.environ.get("RUN_URL") or os.environ.get("ACTIONS_URL", "")
          payload["updated_at"] = now

          path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit results
        if: always()
        run: |
          git add data/news.json data/analytics.json data/status.json data/watch_state.json
          if git diff --cached --quiet; then
            echo "No generated-file changes to commit"
            exit 0
          fi
          git commit -m "chore: update RSS news data"
          git push

      - name: Fail workflow if update step failed
        if: ${{ steps.fetch.outputs.exit_code != '0' || steps.watch.outputs.exit_code != '0' }}
        run: exit 1
